<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Board game - Quản lý xoay vòng vốn</title>
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'K2D', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #D4F1F9 0%, #A2D9F5 100%);
            min-height: 100vh;
            padding: 20px 16px;
        }
        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.92);
            border-radius: 2rem;
            box-shadow: 0 20px 35px rgba(0, 80, 100, 0.15);
            overflow: hidden;
            padding: 18px 20px 32px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0B5E7E, #1B8A6B, #2C9A6E);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .data-actions {
            display: flex;
            gap: 12px;
        }
        .data-actions button {
            background: #1F6E8C;
            padding: 8px 16px;
            font-size: 0.8rem;
            border-radius: 40px;
            color: white;
            border: none;
            cursor: pointer;
        }
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0 20px;
            border-bottom: 2px solid #B8DFF0;
            padding-bottom: 12px;
        }
        .tab-btn {
            background: #EBF7FB;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            color: #1F6E8C;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .tab-btn.active {
            background: linear-gradient(105deg, #2C9A6E, #1F8A5C);
            color: white;
        }
        .tab-panel {
            display: none;
            animation: fadeSlide 0.25s ease;
        }
        .tab-panel.active-panel {
            display: block;
        }
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(6px);}
            to { opacity: 1; transform: translateY(0);}
        }
        .card {
            background: #FFFFFF;
            border-radius: 32px;
            padding: 20px 18px;
            margin-bottom: 28px;
            box-shadow: 0 8px 20px rgba(0, 70, 80, 0.08);
            border: 1px solid #C5E6F2;
        }
        .section-title {
            font-weight: 700;
            font-size: 1.45rem;
            color: #1F6E8C;
            border-left: 8px solid #2C9A6E;
            padding-left: 16px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #EAF9FF, transparent);
            border-radius: 0 20px 20px 0;
        }
        .players-manager {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            background: #EFF9FC;
            padding: 12px 20px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .player-tag {
            background: linear-gradient(110deg, #289B6F, #1F8A5C);
            color: white;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .player-tag button {
            background: none;
            border: none;
            color: #C0F0DA;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
        }
        .add-player-input {
            display: flex;
            gap: 8px;
            margin-left: auto;
            flex-wrap: wrap;
        }
        input, button {
            font-family: 'K2D', monospace;
            font-size: 0.9rem;
            border-radius: 60px;
            border: none;
            padding: 8px 18px;
            outline: none;
        }
        input {
            background: white;
            border: 1px solid #B9DFEE;
        }
        button {
            background: #2C9A6E;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        .table-wrapper {
            overflow-x: auto;
            border-radius: 28px;
            margin: 15px 0;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            min-width: 500px;
        }
        th, td {
            padding: 12px 8px;
            text-align: center;
            border-bottom: 1px solid #D5EDF5;
        }
        th {
            background: #E1F2F9;
            color: #146B4E;
            font-weight: 700;
        }
        .amount-control {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }
        .amount-control input {
            width: 100px;
            text-align: right;
            padding: 6px 8px;
            font-size: 0.85rem;
            border: 1px solid #C2E0EB;
            background: white;
            border-radius: 30px;
        }
        .sign-toggle {
            background: #D9EAF1;
            color: #1F6E8C;
            border: none;
            border-radius: 40px;
            padding: 6px 10px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            width: 44px;
            text-align: center;
        }
        @media (max-width: 700px) {
            .amount-control input { width: 80px; padding: 6px 4px; }
            .sign-toggle { width: 38px; font-size: 0.8rem; }
            .tab-btn { padding: 6px 18px; font-size: 0.85rem; }
        }
        .total-row {
            background: #EAF7F0;
            font-weight: 800;
            color: #146B4E;
        }
        .delete-row-btn {
            background: #E66A4C;
            border-radius: 40px;
            padding: 5px 12px;
            font-size: 0.7rem;
        }
        .money-positive { color: #1F8A5C; font-weight: 700; }
        .money-negative { color: #D9534F; font-weight: 700; }
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: linear-gradient(125deg, #E2F3F9, #CAE9F2);
            border-radius: 32px;
            padding: 20px 12px;
            text-align: center;
            border: 1px solid #B3DFED;
        }
        .big-number {
            font-size: 1.9rem;
            font-weight: 800;
            margin: 8px 0;
        }
        .flex-btns {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .import-file { display: none; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1><i class="fas fa-gamepad"></i> Board game</h1>
        <div class="data-actions">
            <button id="exportDataBtn"><i class="fas fa-download"></i> Lưu dữ liệu</button>
            <button id="importDataBtn"><i class="fas fa-upload"></i> Tải dữ liệu</button>
            <input type="file" id="importFileInput" class="import-file" accept=".json">
        </div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="dashboard"><i class="fas fa-chart-simple"></i> Dashboard</button>
        <button class="tab-btn" data-tab="tienlen"><i class="fas fa-cards-blank"></i> Tiến lên</button>
        <button class="tab-btn" data-tab="xizach"><i class="fas fa-chess-queen"></i> Xì zách / Cào cái</button>
        <button class="tab-btn" data-tab="loto"><i class="fas fa-dice-d6"></i> Lô tô / Cào zùa</button>
    </div>
    <div id="dashboardPanel" class="tab-panel active-panel"><div class="card"><div class="section-title"><i class="fas fa-chart-line"></i> Tổng kết tài chính</div><div class="dashboard-stats" id="dashboardSummaryCards"></div><div class="table-wrapper"><table id="dashboardTable"><thead><tr><th>Người chơi</th><th>Số tiền thực lãi/lỗ</th><th>Phân loại</th></tr></thead><tbody id="dashboardTbody"></tbody></table></div></div></div>
    <div id="tienlenPanel" class="tab-panel"><div class="card"><div class="section-title"><i class="fas fa-users"></i> Tiến lên (tối thiểu 2 người)</div><div class="players-manager" id="tlPlayerManager"></div><div class="table-wrapper" id="tlTableWrapper"></div><div class="flex-btns"><button id="tlAddRoundBtn"><i class="fas fa-plus-circle"></i> Thêm ván mới</button></div></div></div>
    <div id="xizachPanel" class="tab-panel"><div class="card"><div class="section-title"><i class="fas fa-crown"></i> Xì zách / Cào cái (Chọn cái mỗi ván)</div><div class="players-manager" id="xzPlayerManager"></div><div class="table-wrapper" id="xzTableWrapper"></div><div class="flex-btns"><button id="xzAddRoundBtn"><i class="fas fa-plus-circle"></i> Thêm ván + chọn cái</button></div></div></div>
    <div id="lotoPanel" class="tab-panel"><div class="card"><div class="section-title"><i class="fas fa-trophy"></i> Lô tô / Cào zùa (Một người thắng mỗi ván)</div><div class="players-manager" id="ltPlayerManager"></div><div class="table-wrapper" id="ltTableWrapper"></div><div class="flex-btns"><button id="ltAddRoundBtn"><i class="fas fa-plus-circle"></i> Thêm ván (chọn người thắng & tiền cược)</button></div></div></div>
</div>

<script>
    function formatMoney(amount) {
        if (isNaN(amount)) amount = 0;
        let sign = amount < 0 ? "-" : "";
        let absVal = Math.abs(amount);
        return sign + absVal.toLocaleString('vi-VN') + "đ";
    }
    function parseNumberFromInput(value) {
        if (value === undefined || value === null || value === '') return 0;
        let cleaned = String(value).replace(/[^0-9-]/g, '');
        let num = parseFloat(cleaned);
        return isNaN(num) ? 0 : num;
    }

    let appData = {
        tienlen: { players: [], rounds: [] },
        xizach: { players: [], rounds: [] },
        loto: { players: [], rounds: [] }
    };

    function refreshAll() { renderDashboard(); renderTienLen(); renderXiZach(); renderLoto(); }

    function createAmountControl(value, onChange) {
        let container = document.createElement('div');
        container.className = 'amount-control';
        let input = document.createElement('input');
        input.type = 'text';
        input.inputMode = 'numeric';
        input.value = value;
        let toggle = document.createElement('button');
        toggle.textContent = '±';
        toggle.className = 'sign-toggle';
        const setValue = (v) => { let num = parseNumberFromInput(v); input.value = num; onChange(num); };
        input.addEventListener('change', () => setValue(input.value));
        input.addEventListener('input', (e) => {
            let raw = e.target.value.replace(/[^0-9-]/g, '');
            if (raw.split('-').length > 2) raw = raw.replace(/-/g, '');
            if (raw !== e.target.value) input.value = raw;
        });
        toggle.addEventListener('click', () => setValue(-parseNumberFromInput(input.value)));
        container.appendChild(input);
        container.appendChild(toggle);
        return container;
    }

    // TIẾN LÊN
    function renderTienLen() {
        let data = appData.tienlen;
        let container = document.getElementById("tlPlayerManager");
        let tableWrap = document.getElementById("tlTableWrapper");
        let playersHtml = `<div style="display:flex; flex-wrap:wrap; gap:10px; align-items:center; width:100%;">`;
        data.players.forEach(p => { playersHtml += `<span class="player-tag">${escapeHtml(p)} <button onclick="removeTlPlayer('${escapeHtml(p)}')"><i class="fas fa-times-circle"></i></button></span>`; });
        playersHtml += `<div class="add-player-input"><input type="text" id="newTlPlayer" placeholder="Tên người chơi" /><button id="addTlPlayerBtn"><i class="fas fa-user-plus"></i> Thêm</button></div></div>`;
        container.innerHTML = playersHtml;
        document.getElementById("addTlPlayerBtn")?.addEventListener("click", () => {
            let name = document.getElementById("newTlPlayer").value.trim();
            if (name && !appData.tienlen.players.includes(name)) { appData.tienlen.players.push(name); appData.tienlen.rounds = []; refreshAll(); }
            else alert(name ? "Tên đã tồn tại" : "Nhập tên hợp lệ");
            document.getElementById("newTlPlayer").value = "";
        });
        if (data.players.length === 0) { tableWrap.innerHTML = `<div class="card">🌟 Thêm người chơi</div>`; return; }
        let players = data.players, rounds = data.rounds;
        let totals = players.map((_, idx) => rounds.reduce((sum, r) => sum + (r.amounts[players[idx]] || 0), 0));
        let html = `<table><thead><tr><th>Ván</th>${players.map(p => `<th>${escapeHtml(p)} (đ)</th>`).join('')}<th>Xoá</th></tr></thead><tbody>`;
        for (let i = 0; i < rounds.length; i++) {
            html += `<tr><td><strong>#${i+1}</strong></td>`;
            for (let p of players) html += `<td class="tl-cell-${i}-${escapeHtml(p)}"></td>`;
            html += `<td><button class="delete-row-btn" data-round="${i}"><i class="fas fa-trash-alt"></i> Xóa</button></td></tr>`;
        }
        html += `<tr class="total-row"><td><strong>TỔNG</strong></td>${players.map((p, idx) => `<td class="${totals[idx]>=0?'money-positive':'money-negative'}">${formatMoney(totals[idx])}</td>`).join('')}<td></td></tr>`;
        html += `</tbody></table>`;
        tableWrap.innerHTML = html;
        for (let i = 0; i < rounds.length; i++) {
            for (let p of players) {
                let cell = document.querySelector(`.tl-cell-${i}-${escapeHtml(p)}`);
                if (cell) {
                    let current = rounds[i].amounts[p] || 0;
                    let control = createAmountControl(current, (newVal) => { appData.tienlen.rounds[i].amounts[p] = newVal; refreshAll(); });
                    cell.innerHTML = ''; cell.appendChild(control);
                }
            }
        }
        document.querySelectorAll('.delete-row-btn').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.round); appData.tienlen.rounds.splice(idx,1); refreshAll(); }));
    }
    window.removeTlPlayer = (name) => { appData.tienlen.players = appData.tienlen.players.filter(p => p !== name); appData.tienlen.rounds = []; refreshAll(); };
    document.getElementById("tlAddRoundBtn")?.addEventListener("click", () => { if(appData.tienlen.players.length){ let o={}; appData.tienlen.players.forEach(p=>o[p]=0); appData.tienlen.rounds.push({amounts:o}); refreshAll(); } else alert("Thêm người chơi trước"); });

    // XÌ ZÁCH (đã fix lỗi hiển thị)
    function renderXiZach() {
        let data = appData.xizach;
        let container = document.getElementById("xzPlayerManager");
        let tableWrap = document.getElementById("xzTableWrapper");
        let playersHtml = `<div style="display:flex; flex-wrap:wrap; gap:10px;">`;
        data.players.forEach(p => { playersHtml += `<span class="player-tag">${escapeHtml(p)} <button onclick="removeXzPlayer('${escapeHtml(p)}')"><i class="fas fa-times-circle"></i></button></span>`; });
        playersHtml += `<div class="add-player-input"><input type="text" id="newXzPlayer" placeholder="Tên" /><button id="addXzPlayerBtn"><i class="fas fa-user-plus"></i> Thêm</button></div></div>`;
        container.innerHTML = playersHtml;
        document.getElementById("addXzPlayerBtn")?.addEventListener("click", () => {
            let name = document.getElementById("newXzPlayer").value.trim();
            if (name && !appData.xizach.players.includes(name)) { appData.xizach.players.push(name); appData.xizach.rounds = []; refreshAll(); }
            else alert(name ? "Trùng tên" : "Nhập tên");
            document.getElementById("newXzPlayer").value = "";
        });
        if (data.players.length === 0) { tableWrap.innerHTML = `<div class="card">🎲 Thêm người chơi</div>`; return; }
        let players = data.players, rounds = data.rounds;
        // tính tổng cho bảng tổng kết
        let totalMap = new Map(); players.forEach(p => totalMap.set(p, 0)); totalMap.set("💰 CÁI", 0);
        rounds.forEach(r => {
            let sum = 0;
            players.forEach(p => { let amt = r.amounts[p] || 0; sum += amt; totalMap.set(p, totalMap.get(p) + amt); });
            totalMap.set("💰 CÁI", totalMap.get("💰 CÁI") - sum);
        });
        let html = `<table><thead><tr><th>Ván</th><th>Cái</th>${players.map(p => `<th>${escapeHtml(p)} (đ)</th>`).join('')}<th>Tiền Cái</th><th>Xoá</th></tr></thead><tbody>`;
        for (let i = 0; i < rounds.length; i++) {
            let r = rounds[i];
            let sumRound = players.reduce((s, p) => s + (r.amounts[p] || 0), 0);
            let dealerAmt = -sumRound;
            html += `<tr><td>${i+1}</td><td><strong>${escapeHtml(r.dealer)}</strong></td>`;
            for (let p of players) html += `<td class="xz-cell-${i}-${escapeHtml(p)}"></td>`;
            html += `<td class="${dealerAmt>=0?'money-positive':'money-negative'}">${formatMoney(dealerAmt)}</td>`;
            html += `<td><button class="delete-xz-round" data-round="${i}"><i class="fas fa-trash"></i> Xóa</button></td></tr>`;
        }
        html += `<tr class="total-row"><td colspan="2">TỔNG KẾT</td>`;
        for (let p of players) html += `<td class="${totalMap.get(p)>=0?'money-positive':'money-negative'}">${formatMoney(totalMap.get(p))}</td>`;
        html += `<td class="${totalMap.get("💰 CÁI")>=0?'money-positive':'money-negative'}">${formatMoney(totalMap.get("💰 CÁI"))}</td><td></td></tr>`;
        html += `</tbody></table>`;
        tableWrap.innerHTML = html;
        for (let i = 0; i < rounds.length; i++) {
            for (let p of players) {
                let cell = document.querySelector(`.xz-cell-${i}-${escapeHtml(p)}`);
                if (cell) {
                    let current = rounds[i].amounts[p] || 0;
                    let control = createAmountControl(current, (newVal) => { appData.xizach.rounds[i].amounts[p] = newVal; refreshAll(); });
                    cell.innerHTML = ''; cell.appendChild(control);
                }
            }
        }
        document.querySelectorAll('.delete-xz-round').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.round); appData.xizach.rounds.splice(idx,1); refreshAll(); }));
    }
    window.removeXzPlayer = (name) => { appData.xizach.players = appData.xizach.players.filter(p => p !== name); appData.xizach.rounds = []; refreshAll(); };
    document.getElementById("xzAddRoundBtn")?.addEventListener("click", () => {
        let pl = appData.xizach.players;
        if (!pl.length) { alert("Thêm người chơi trước"); return; }
        let dealer = prompt("Ai làm cái? (nhập tên)", pl[0]);
        if (!dealer || !pl.includes(dealer)) { alert("Tên cái không hợp lệ"); return; }
        let amounts = {}; pl.forEach(p => amounts[p] = 0);
        appData.xizach.rounds.push({ dealer: dealer, amounts: amounts });
        refreshAll();
    });

    // LÔ TÔ
    function renderLoto() {
        let data = appData.loto;
        let container = document.getElementById("ltPlayerManager");
        let tableWrap = document.getElementById("ltTableWrapper");
        let playersHtml = `<div style="display:flex; flex-wrap:wrap; gap:10px;">`;
        data.players.forEach(p => { playersHtml += `<span class="player-tag">${escapeHtml(p)} <button onclick="removeLtPlayer('${escapeHtml(p)}')"><i class="fas fa-times-circle"></i></button></span>`; });
        playersHtml += `<div class="add-player-input"><input type="text" id="newLtPlayer" placeholder="Tên" /><button id="addLtPlayerBtn"><i class="fas fa-user-plus"></i> Thêm</button></div></div>`;
        container.innerHTML = playersHtml;
        document.getElementById("addLtPlayerBtn")?.addEventListener("click", () => {
            let name = document.getElementById("newLtPlayer").value.trim();
            if (name && !appData.loto.players.includes(name)) { appData.loto.players.push(name); appData.loto.rounds = []; refreshAll(); }
            else alert(name ? "Trùng tên" : "Nhập tên");
            document.getElementById("newLtPlayer").value = "";
        });
        if (data.players.length === 0) { tableWrap.innerHTML = `<div class="card">🌸 Thêm người chơi</div>`; return; }
        let players = data.players, rounds = data.rounds;
        let totalMap = new Map(); players.forEach(p => totalMap.set(p, 0));
        let html = `<table><thead><tr><th>Ván</th><th>Tiền cược (mỗi người)</th><th>Người thắng</th>${players.map(p => `<th>${escapeHtml(p)} (lãi/lỗ)</th>`).join('')}<th>Xóa</th></tr></thead><tbody>`;
        for (let i = 0; i < rounds.length; i++) {
            let r = rounds[i];
            let N = players.length;
            let profit = {};
            players.forEach(p => { let delta = (p === r.winner) ? (N-1)*r.betAmount : -r.betAmount; profit[p] = delta; totalMap.set(p, totalMap.get(p) + delta); });
            html += `<tr><td>${i+1}</td><td>${formatMoney(r.betAmount)}</td><td><strong>🎉 ${escapeHtml(r.winner)}</strong></td>`;
            players.forEach(p => html += `<td class="${profit[p]>=0?'money-positive':'money-negative'}">${formatMoney(profit[p])}</td>`);
            html += `<td><button class="delete-lt-round" data-round="${i}"><i class="fas fa-trash"></i> Xóa</button></td></tr>`;
        }
        html += `<tr class="total-row"><td colspan="3">TỔNG LỢI NHUẬN</td>`;
        players.forEach(p => html += `<td class="${totalMap.get(p)>=0?'money-positive':'money-negative'}">${formatMoney(totalMap.get(p))}</td>`);
        html += `<td></td></tr></tbody></table>`;
        tableWrap.innerHTML = html;
        document.querySelectorAll('.delete-lt-round').forEach(btn => btn.addEventListener('click', (e) => { let idx = parseInt(btn.dataset.round); appData.loto.rounds.splice(idx,1); refreshAll(); }));
    }
    window.removeLtPlayer = (name) => { appData.loto.players = appData.loto.players.filter(p => p !== name); appData.loto.rounds = []; refreshAll(); };
    document.getElementById("ltAddRoundBtn")?.addEventListener("click", () => {
        let pl = appData.loto.players;
        if (!pl.length) { alert("Thêm người chơi trước"); return; }
        let bet = parseFloat(prompt("Tiền cược mỗi người (VNĐ):", "10000"));
        if (isNaN(bet) || bet <= 0) { alert("Số tiền hợp lệ"); return; }
        let winner = prompt(`Người thắng? (${pl.join(", ")})`, pl[0]);
        if (!winner || !pl.includes(winner)) { alert("Tên người thắng không hợp lệ"); return; }
        appData.loto.rounds.push({ betAmount: bet, winner: winner });
        refreshAll();
    });

    // DASHBOARD
    function renderDashboard() {
        let profit = new Map();
        appData.tienlen.rounds.forEach(r => { Object.entries(r.amounts).forEach(([pl, val]) => profit.set(pl, (profit.get(pl)||0) + val)); });
        appData.xizach.rounds.forEach(r => {
            let sum = 0;
            Object.entries(r.amounts).forEach(([pl, val]) => { sum += val; profit.set(pl, (profit.get(pl)||0) + val); });
            profit.set(r.dealer, (profit.get(r.dealer)||0) - sum);
        });
        appData.loto.rounds.forEach(r => {
            let N = appData.loto.players.length;
            if (N===0) return;
            appData.loto.players.forEach(p => { let delta = (p === r.winner) ? (N-1)*r.betAmount : -r.betAmount; profit.set(p, (profit.get(p)||0) + delta); });
        });
        let sorted = Array.from(profit.entries()).sort((a,b)=>b[1]-a[1]);
        let totalWin = sorted.reduce((s, [,v]) => s + (v>0?v:0), 0);
        let totalLoss = sorted.reduce((s, [,v]) => s + (v<0?-v:0), 0);
        document.getElementById("dashboardSummaryCards").innerHTML = `
            <div class="stat-card"><i class="fas fa-arrow-up"></i><div class="big-number money-positive">${formatMoney(totalWin)}</div><div>Tổng tiền thắng</div></div>
            <div class="stat-card"><i class="fas fa-arrow-down"></i><div class="big-number money-negative">${formatMoney(totalLoss)}</div><div>Tổng tiền thua</div></div>
            <div class="stat-card"><i class="fas fa-user-friends"></i><div class="big-number">${sorted.length}</div><div>Người chơi</div></div>
        `;
        let tbody = document.getElementById("dashboardTbody");
        tbody.innerHTML = sorted.length ? sorted.map(([name,val]) => `<tr><td><strong>${escapeHtml(name)}</strong></td><td class="${val>=0?'money-positive':'money-negative'}">${formatMoney(val)}</td><td>${val>=0?'🏆 Đang thắng':'📉 Đang thua'}</td></tr>`).join('') : `<tr><td colspan="3">Chưa có dữ liệu</td></tr>`;
    }

    // LƯU / TẢI
    document.getElementById("exportDataBtn")?.addEventListener("click", () => {
        let dataStr = JSON.stringify(appData, null, 2);
        let blob = new Blob([dataStr], {type: "application/json"});
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download = `boardgame_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    });
    document.getElementById("importDataBtn")?.addEventListener("click", () => document.getElementById("importFileInput").click());
    document.getElementById("importFileInput")?.addEventListener("change", (e) => {
        let file = e.target.files[0];
        if (!file) return;
        let reader = new FileReader();
        reader.onload = (ev) => {
            try {
                let imported = JSON.parse(ev.target.result);
                if (imported.tienlen && imported.xizach && imported.loto) { appData = imported; refreshAll(); alert("Tải thành công!"); }
                else alert("File không đúng định dạng");
            } catch(err) { alert("Lỗi đọc file"); }
            e.target.value = "";
        };
        reader.readAsText(file);
    });

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    // CHUYỂN TAB
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = { dashboard: document.getElementById("dashboardPanel"), tienlen: document.getElementById("tienlenPanel"), xizach: document.getElementById("xizachPanel"), loto: document.getElementById("lotoPanel") };
    tabs.forEach(btn => btn.addEventListener('click', () => {
        let tab = btn.dataset.tab;
        tabs.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        Object.values(panels).forEach(p => p.classList.remove('active-panel'));
        if(panels[tab]) panels[tab].classList.add('active-panel');
        refreshAll();
    }));
    refreshAll();
</script>
</body>
</html>
